name: Build Caelestia Packages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
  workflow_dispatch:
  repository_dispatch:
    types: [rebuild]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build packages in Arch Linux container
        run: |
          docker run --rm --pull always \
            -v "${{ github.workspace }}:/workspace" \
            archlinux:base-devel \
            bash /workspace/build.sh /workspace

      - name: Verify repository database
        run: |
          echo "=== Checking repository files ==="
          ls -lh public/x86_64/
          test -f public/x86_64/caelestia.db || { echo "FATAL: caelestia.db missing!"; exit 1; }
          test -f public/x86_64/caelestia.files || { echo "FATAL: caelestia.files missing!"; exit 1; }
          test -f public/x86_64/caelestia.db.tar.gz || { echo "FATAL: caelestia.db.tar.gz missing!"; exit 1; }
          echo "✅ All repository files present"

      - name: Create index page
        run: |
          mkdir -p public
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Caelestia Package Repository</title>
              <meta charset="utf-8">
              <style>
                  body { font-family: monospace; max-width: 800px; margin: 50px auto; padding: 20px; }
                  h1 { color: #5555ff; }
                  pre { background: #f5f5f5; padding: 15px; border-radius: 5px; }
                  code { background: #e0e0e0; padding: 2px 6px; border-radius: 3px; }
              </style>
          </head>
          <body>
              <h1>Caelestia Package Repository</h1>
              <p>Custom Arch Linux packages for Caelestia dotfiles by Rust-Frog</p>
              
              <h2>Usage</h2>
              <p>Add to <code>/etc/pacman.conf</code>:</p>
              <pre>[caelestia]
          SigLevel = Optional TrustAll
          Server = https://rust-frog.github.io/dots-package/$arch</pre>
              
              <p>Then install:</p>
              <pre>sudo pacman -Sy caelestia-cli caelestia-shell</pre>
              
              <h2>Packages</h2>
              <ul>
                  <li><strong>caelestia-cli</strong> - CLI tool for wallpaper, color schemes, shell control</li>
                  <li><strong>caelestia-shell</strong> - QML desktop shell with C++ plugin for Quickshell</li>
              </ul>
              
              <h2>Links</h2>
              <ul>
                  <li><a href="https://github.com/Rust-Frog/dots">Dotfiles</a></li>
                  <li><a href="https://github.com/Rust-Frog/cli">CLI Source</a></li>
                  <li><a href="https://github.com/Rust-Frog/CShell">Shell Source</a></li>
                  <li><a href="x86_64/">Package Index</a></li>
              </ul>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: false
          force_orphan: true
